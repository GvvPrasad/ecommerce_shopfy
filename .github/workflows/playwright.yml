name: Playwright Tests

on:
  push:
    branches: [ main, gvv ] # Run tests when code is pushed to 'main' or 'gvv'
  pull_request:
    branches: [ main ] # Run tests on pull requests targeting 'main'

jobs:
  playwright-tests:
    runs-on: ubuntu-latest # Use the latest Ubuntu runner

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4] # Split tests into 4 shards

    steps:
      - name: Checkout code
        uses: actions/checkout@v5 # Pulls your repository code into the runner

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/* # Installs the latest LTS version of Node.js

      - name: Install dependencies
        run: npm ci # Installs dependencies from package-lock.json

      - name: Install Playwright browsers
        run: npx playwright install --with-deps # Installs required browsers and OS deps

      - name: Run Playwright tests
        run: xvfb-run --auto-servernum npx playwright test --shard=${{ matrix.shard }}/4 --reporter=line,allure-playwright
        # 'xvfb-run' allows running browsers in headless mode on Linux CI
        # '--reporter=line,allure-playwright' generates both console output and Allure results

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
        # Uploads the default Playwright HTML report per shard

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: allure-results-shard-${{ matrix.shard }}
          path: allure-results/
        # Uploads Allure results per shard

